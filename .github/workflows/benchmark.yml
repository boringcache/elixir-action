name: Elixir Setup Benchmark

on:
  workflow_dispatch:

env:
  BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}

jobs:
  elixir-actions-cache:
    name: "Baseline: erlef/setup-beam + actions/cache"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        run: [1, 2, 3]
    steps:
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17'
          otp-version: '27'

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: elixir-benchmark-${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: elixir-benchmark-${{ runner.os }}-mix-

      - name: Create and build project
        run: |
          mix new benchmark_app
          cd benchmark_app
          cat > mix.exs << 'ELIXIR'
          defmodule BenchmarkApp.MixProject do
            use Mix.Project
            def project do
              [app: :benchmark_app, version: "0.1.0", elixir: "~> 1.17",
               deps: deps()]
            end
            defp deps do
              [{:jason, "~> 1.4"}, {:plug, "~> 1.16"}, {:telemetry, "~> 1.3"}]
            end
          end
          ELIXIR
          START_TIME=$(date +%s%N)
          mix deps.get && mix compile
          END_TIME=$(date +%s%N)
          DURATION=$(( (END_TIME - START_TIME) / 1000000 ))
          echo "erlef/setup-beam deps+compile - Run ${{ matrix.run }}: ${DURATION}ms"
          mkdir -p benchmark-results
          echo "${DURATION}" > benchmark-results/actions-cache-run${{ matrix.run }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: actions-cache-results-${{ matrix.run }}
          path: benchmark_app/benchmark-results/

  elixir-boringcache:
    name: "Test: boringcache/elixir"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        run: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir with boringcache
        uses: ./
        with:
          workspace: boringcache/actions
          elixir-version: '1.17'
          erlang-version: '27'

      - name: Create and build project
        run: |
          mix new benchmark_app
          cd benchmark_app
          cat > mix.exs << 'ELIXIR'
          defmodule BenchmarkApp.MixProject do
            use Mix.Project
            def project do
              [app: :benchmark_app, version: "0.1.0", elixir: "~> 1.17",
               deps: deps()]
            end
            defp deps do
              [{:jason, "~> 1.4"}, {:plug, "~> 1.16"}, {:telemetry, "~> 1.3"}]
            end
          end
          ELIXIR
          START_TIME=$(date +%s%N)
          mix deps.get && mix compile
          END_TIME=$(date +%s%N)
          DURATION=$(( (END_TIME - START_TIME) / 1000000 ))
          echo "boringcache/elixir deps+compile - Run ${{ matrix.run }}: ${DURATION}ms"
          mkdir -p benchmark-results
          echo "${DURATION}" > benchmark-results/boringcache-run${{ matrix.run }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: boringcache-results-${{ matrix.run }}
          path: benchmark_app/benchmark-results/

  benchmark-summary:
    name: Generate Summary
    runs-on: ubuntu-latest
    needs: [elixir-actions-cache, elixir-boringcache]
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*-results-*"
          merge-multiple: true

      - name: Generate summary
        run: |
          echo "# Elixir Setup Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Mix deps.get + compile Times" >> $GITHUB_STEP_SUMMARY
          echo "| Run | erlef/setup-beam + actions/cache | boringcache/elixir | Improvement |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------------------------------|-------------------|-------------|" >> $GITHUB_STEP_SUMMARY

          for run in 1 2 3; do
            if [[ -f "actions-cache-run${run}.txt" && -f "boringcache-run${run}.txt" ]]; then
              a=$(cat "actions-cache-run${run}.txt")
              b=$(cat "boringcache-run${run}.txt")
              if [[ $b -gt 0 ]]; then
                imp=$(echo "scale=2; $a / $b" | bc -l)
              else
                imp="N/A"
              fi
              echo "| $run | ${a}ms | ${b}ms | ${imp}x |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $run | Missing | Missing | N/A |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Summary" >> $GITHUB_STEP_SUMMARY

          if [[ -f actions-cache-run1.txt && -f actions-cache-run2.txt && -f actions-cache-run3.txt && \
                -f boringcache-run1.txt && -f boringcache-run2.txt && -f boringcache-run3.txt ]]; then
            aa=$(( ($(cat actions-cache-run1.txt)+$(cat actions-cache-run2.txt)+$(cat actions-cache-run3.txt))/3 ))
            bb=$(( ($(cat boringcache-run1.txt)+$(cat boringcache-run2.txt)+$(cat boringcache-run3.txt))/3 ))
            if [[ $bb -gt 0 ]]; then
              imp=$(echo "scale=2; $aa / $bb" | bc -l)
            else
              imp="N/A"
            fi
            echo "- **erlef/setup-beam + actions/cache average**: ${aa}ms" >> $GITHUB_STEP_SUMMARY
            echo "- **boringcache/elixir average**: ${bb}ms" >> $GITHUB_STEP_SUMMARY
            echo "- **Improvement**: ${imp}x" >> $GITHUB_STEP_SUMMARY
          fi
